!
hostname upf-sim
!
bpf-program upf-1
 path bin/upf.bpf
 no shutdown
!
interface upf
 bpf-program upf-1
 ip route table-id 1020
 no shutdown
!
ip pool upf-v4
 prefix 10.0.0.0/12
 no shutdown
!
ip pool upf-v6
 prefix 2abc:e00:6020::/44
 no shutdown
!
access-point-name boa
 session-lifetime 43200
 ip pool upf-v4
 ip pool upf-v6
!
pfcp-peer-list pptest
 peer 10.0.0.1
!
pfcp-router pfcp-1
 description first_one
 node-id sut.example.com
 bpf-program upf-1
 pfcp-peer-list pptest
 listen 192.168.61.194 port 8805
 gtpu-tunnel-endpoint all 192.168.61.1 port 2152
 strict-apn
 debug ingress_msg
 debug egress_msg
 capture imsi 208010101234568 side all
 urr-static-link 10
!
line vty
 no login
 listen 127.0.0.1 1664
!
capture-config
 record-path /tmp
 snaplen 1000
 wakeup-events 1
!
end
